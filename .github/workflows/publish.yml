name: Publish Extension

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (예: 2.18.3). 비우면 wxt.config.ts fallback 사용.'
        required: false
        type: string
      dry_run:
        description: 'wxt submit --dry-run (credentials만 검증, 실제 업로드 없음)'
        required: false
        type: boolean
        default: true

permissions:
  contents: read

env:
  NODE_VERSION: 20

jobs:
  build:
    name: Build & Verify
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            TAG="${GITHUB_REF_NAME}"
            VERSION="${TAG#v}"
          else
            VERSION="${{ inputs.version }}"
          fi
          if [[ -n "$VERSION" ]] && ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version '$VERSION' is not a valid semver (expected X.Y.Z)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - name: Type check
        run: npm run compile

      - name: Test
        run: npm test

      - name: Build & zip (Chrome / Edge)
        run: npm run zip
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}

      - name: Build & zip (Firefox + sources)
        run: npm run zip:firefox
        env:
          RELEASE_VERSION: ${{ steps.version.outputs.version }}

      - name: Lint Firefox build (web-ext)
        # web-ext lint는 Firefox 전용 도구 — Chrome 빌드 검증 시 FF 요구사항 위반으로 무조건 fail.
        run: npx --yes web-ext lint --source-dir .output/firefox-mv2 --self-hosted

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-zips
          path: .output/*.zip
          # .output은 dot-prefixed → upload-artifact v4 기본 무시. 명시적으로 켜야 함.
          include-hidden-files: true
          if-no-files-found: error
          retention-days: 7

  publish-chrome:
    name: Publish to Chrome Web Store
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: extension-zips
          path: .output
      - name: Submit
        run: npx wxt submit ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }} --chrome-zip .output/*-chrome.zip
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}

  publish-firefox:
    name: Publish to Firefox AMO
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: extension-zips
          path: .output
      - name: Submit
        run: npx wxt submit ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }} --firefox-zip .output/*-firefox.zip --firefox-sources-zip .output/*-sources.zip
        env:
          FIREFOX_EXTENSION_ID: ${{ secrets.FIREFOX_EXTENSION_ID }}
          FIREFOX_JWT_ISSUER: ${{ secrets.FIREFOX_JWT_ISSUER }}
          FIREFOX_JWT_SECRET: ${{ secrets.FIREFOX_JWT_SECRET }}

  publish-edge:
    name: Publish to Microsoft Edge Add-ons
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          name: extension-zips
          path: .output
      - name: Submit
        run: npx wxt submit ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '--dry-run' || '' }} --edge-zip .output/*-chrome.zip
        env:
          EDGE_PRODUCT_ID: ${{ secrets.EDGE_PRODUCT_ID }}
          EDGE_CLIENT_ID: ${{ secrets.EDGE_CLIENT_ID }}
          EDGE_API_KEY: ${{ secrets.EDGE_API_KEY }}

  notify-discord:
    name: Notify Discord
    needs: [build, publish-chrome, publish-firefox, publish-edge]
    runs-on: ubuntu-latest
    # 실제 release일 때만 알림. publish 모두 성공해야 알림 — 일부 실패 시 수동 확인 후 재공지.
    if: github.event_name == 'release'
    steps:
      - name: Post to Discord
        env:
          WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          VERSION: ${{ needs.build.outputs.version }}
          RELEASE_URL: ${{ github.event.release.html_url }}
          RELEASE_NOTES: ${{ github.event.release.body }}
        run: |
          # 기존 공지 톤: 코드 블록 버전 + bullet list + GitHub URL (Discord 자동 embed)
          CONTENT=$(jq -n \
            --arg ver "$VERSION" \
            --arg url "$RELEASE_URL" \
            --arg notes "$RELEASE_NOTES" \
            '{
              content: "`\($ver)` 버전 업데이트\n\n\($notes)\n\n\($url)"
            }')
          curl -sS -H "Content-Type: application/json" -X POST -d "$CONTENT" "$WEBHOOK"

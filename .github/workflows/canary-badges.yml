name: chzzk badges

# 배지 인벤토리 자동 수집. 저녁 피크타임 매 시간 (KST 18-24) — 스트리머 활발 =
# 배지 다양성 최대. 이미지 sha256 hash 기반 dedup으로 URL만 바뀐 케이스 흡수.

on:
  schedule:
    # UTC 기준. KST = UTC+9. 저녁 18-23 KST = UTC 09-14.
    - cron: '0 9,10,11,12,13,14 * * *'
  workflow_dispatch: {}

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run badges canary
        env:
          BADGE_TOTAL: '100'
          BADGE_PARALLEL: '8'
          BADGE_BATCH_DELAY_MS: '3000'
          DISCORD_CANARY_WEBHOOK: ${{ secrets.DISCORD_CANARY_WEBHOOK }}
        run: npm run canary:badges

      - name: Commit updated inventory
        run: |
          if [ -n "$(git status --porcelain snapshots/chzzk-badges.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add snapshots/chzzk-badges.json
            git commit -m "chore(canary): chzzk 배지 인벤토리 갱신 [skip ci]"
            git push
          fi
